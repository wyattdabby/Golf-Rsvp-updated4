<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Michael D Annual Golf Tournament 2026 — Foursomes</title>
<style>
  :root{--green:#1f7a4d;--green-dark:#16623c;--green-soft:#e8f3ec;--ink:#1c2421;
    --muted:#6b7770;--line:#e2e7e4;--bg:#f4f7f5;--card:#fff;--amber:#b8860b;
    --shadow:0 1px 2px rgba(16,40,28,.06),0 6px 20px rgba(16,40,28,.06);}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
  .wrap{max-width:1180px;margin:0 auto;padding:0 18px 60px}
  .hero{background:linear-gradient(160deg,var(--green),var(--green-dark));color:#fff;
    border-radius:0 0 20px 20px;padding:28px 26px 24px;margin-bottom:20px}
  .hero h1{margin:0 0 6px;font-size:23px;letter-spacing:-.02em}
  .hero .meta{font-size:14px;opacity:.92;line-height:1.6}
  .hero .meta b{font-weight:600}
  .updated{font-size:12px;opacity:.8;margin-top:11px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .updated button{font:inherit;font-size:12px;background:rgba(255,255,255,.16);
    border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:8px;padding:4px 10px;cursor:pointer}
  .cards{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px;box-shadow:var(--shadow)}
  .card .label{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)}
  .card .value{font-size:25px;font-weight:650;margin-top:5px}
  .card.good .value{color:var(--green)}
  .barrow{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin:6px 0 12px}
  .barrow h2{font-size:13px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin:0}
  .tools{display:flex;gap:8px;flex-wrap:wrap}
  .tools button{font:inherit;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--line);
    background:#fff;color:var(--ink);border-radius:9px;padding:7px 12px}
  .tools button:hover{border-color:#cfd6d2}
  .tools button.primary{background:var(--green);border-color:var(--green);color:#fff}
  .tools button.primary:hover{background:var(--green-dark)}
  .tools button.amber{background:var(--amber);border-color:var(--amber);color:#fff}
  .help{font-size:12.5px;color:var(--muted);background:#fbfcfb;border:1px solid var(--line);
    border-radius:12px;padding:11px 14px;margin-bottom:16px;line-height:1.55}
  .help code{background:#f1f4f2;padding:1px 5px;border-radius:5px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
  .four{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px 14px;box-shadow:var(--shadow)}
  .four.un{background:var(--green-soft);border-color:#cfe5d8}
  .four.over{outline:2px dashed var(--green);outline-offset:2px}
  .fh{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px}
  .fname{font-size:15px;cursor:text}
  .cnt{font-size:12px;font-weight:600;color:var(--muted);background:#f1f1ef;border-radius:999px;padding:2px 10px}
  .cnt.full{background:var(--green);color:#fff}
  .toks{display:grid;gap:8px;min-height:22px}
  .tok{display:flex;align-items:center;gap:8px;border:1px solid var(--line);border-radius:10px;
    padding:9px 10px;background:#fff;cursor:grab}
  .tok.tbd{opacity:.6}
  .tok .gr{color:#c2c8c4;flex:none;cursor:grab}
  .tok .tn{font-weight:600;font-size:13.5px}
  .tok .star{color:var(--green-dark)}
  .tok .te{color:var(--muted);font-size:12px;margin-left:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .tok .x{margin-left:auto;flex:none;border:none;background:none;color:#c2c8c4;cursor:pointer;font-size:13px;padding:2px 5px;border-radius:6px}
  .tok .x:hover{background:#fdecec;color:#c0392b}
  .fadd{display:flex;gap:6px;margin-top:10px}
  .fadd input{flex:1;font:inherit;font-size:13px;padding:6px 9px;border:1px solid var(--line);border-radius:8px;outline:none}
  .fadd input:focus{border-color:var(--green)}
  .fadd button{font:inherit;font-size:12.5px;font-weight:600;cursor:pointer;border:1px solid var(--line);
    background:#fff;color:var(--green-dark);border-radius:8px;padding:6px 10px}
  .fadd button.ghost{color:var(--muted)}
  .fadd button:hover{border-color:#cfd6d2}
  h2.sec{font-size:14px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin:28px 0 12px}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);overflow:hidden}
  .pay-head{padding:13px 16px;border-bottom:1px solid var(--line);font-size:13px;color:var(--muted)}
  .pay-head b{color:var(--ink)}
  .bar{height:9px;border-radius:999px;background:var(--green-soft);overflow:hidden;margin-top:8px;max-width:280px}
  .bar>span{display:block;height:100%;background:var(--green)}
  .pay-row{display:flex;align-items:center;gap:12px;padding:11px 16px;border-bottom:1px solid var(--line)}
  .pay-row:last-child{border-bottom:none}
  .pay-row input{width:19px;height:19px;accent-color:var(--green);cursor:pointer;flex:none}
  .pay-row .nm{flex:1;font-weight:600}
  .pay-row.paid .nm{color:var(--muted);text-decoration:line-through}
  .pill{display:inline-block;padding:2px 9px;border-radius:999px;background:var(--green-soft);color:var(--green-dark);font-size:12px;font-weight:600}
  .amt{font-variant-numeric:tabular-nums;font-weight:600;min-width:64px;text-align:right}
  .tag{font-size:11px;font-weight:600;padding:2px 8px;border-radius:999px}
  .tag.y{background:var(--green-soft);color:var(--green-dark)}
  .tag.n{background:#fbf1e0;color:var(--amber)}
  .err{background:#fdecec;border:1px solid #f5c6c6;color:#8a2b2b;padding:11px 14px;border-radius:12px;margin-bottom:14px;font-size:13.5px}
  .spin{display:inline-block;width:15px;height:15px;border:2px solid var(--green-soft);
    border-top-color:var(--green);border-radius:50%;animation:sp .8s linear infinite;vertical-align:-2px}
  @keyframes sp{to{transform:rotate(360deg)}}
  @media(max-width:780px){.cards{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="hero">
  <div class="wrap" style="padding-bottom:0">
    <h1>&#9971; Michael D Annual Golf Tournament 2026</h1>
    <div class="meta">
      <b>Monday, August 17, 2026</b> &middot; 9:00 AM CST<br>
      Oak Park Country Club &middot; 2001 N Thatcher Ave, River Grove, IL 60171<br>
      Payment via Venmo <b>@Trisha-Connolly</b> &mdash; registration is not complete until paid.
    </div>
    <div class="updated"><span id="updated">Loading...</span>
      <button id="refresh">&#8635; Refresh</button>
      <span style="opacity:.7">v4 &middot; foursomes &middot; drag &amp; drop</span></div>
  </div>
</div>
<div class="wrap">
  <div id="errbox"></div>
  <div id="app"><div class="panel" style="padding:30px"><span class="spin"></span> &nbsp;Loading RSVPs...</div></div>
</div>
<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRMAm_RfEnMgwNnJ3mztqgI-rXMkgX4dZw5kiYuUD8yvU9GoyP4VvXanZfA5A04vCggXJAURv2_f6OG/pub?output=csv";
const SAVED_ARRANGEMENT = null; /*ARR*/
const TIERS=[{label:"Single Golfer",g:1,p:350},{label:"Twosome",g:2,p:700},{label:"Foursome",g:4,p:1400}];
const ARR_KEY="golf_arr_v4", PAID_KEY="golf_paid_v4";

const $ = id => document.getElementById(id);
const qsa = s => Array.prototype.slice.call(document.querySelectorAll(s));
function esc(s){ return (s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function fmt(n){ return "$" + (n||0).toLocaleString("en-US"); }
function lsGet(k,d){ try{ const v=JSON.parse(localStorage.getItem(k)); return v==null?d:v; }catch(e){ return d; } }
function lsSet(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){} }

let REGS=[];
let ARR=null;
let PAID=lsGet(PAID_KEY,{});

function tierFor(label){ if(!label) return null; const L=String(label).toLowerCase();
  return TIERS.find(t=>L.includes(t.label.toLowerCase())||t.label.toLowerCase().includes(L))||null; }

function parseCSV(text){
  const rows=[]; let row=[],f="",i=0,q=false;
  while(i<text.length){ const c=text[i];
    if(q){ if(c==='"'){ if(text[i+1]==='"'){f+='"';i++;} else q=false; } else f+=c; }
    else { if(c==='"')q=true; else if(c===','){row.push(f);f="";} else if(c==='\r'){}
      else if(c==='\n'){row.push(f);rows.push(row);row=[];f="";} else f+=c; }
    i++; }
  if(f.length||row.length){ row.push(f); rows.push(row); }
  return rows;
}
function pick(rec,res){ for(const k in rec){ for(const re of res) if(re.test(k)) return rec[k]; } return ""; }
function parseGolfers(s){
  if(!s) return [];
  const t=s.trim();
  if(!t||/^tbd\.?$/i.test(t)||/^n\/?a$/i.test(t)||/^none$/i.test(t)) return [];
  return t.split(/[;,\n]+| and /i).map(e=>e.trim()).filter(Boolean).map(entry=>{
    let email=""; const em=entry.match(/[\w.+-]+@[\w.-]+\.\w+/); if(em) email=em[0];
    let name=entry.replace(/[|<>]/g," "); if(email) name=name.replace(email," ");
    return { name:name.replace(/\s+/g," ").trim(), email:email };
  });
}
function buildReg(rec){
  const name=pick(rec,[/full name/,/^name/,/\bname\b/])||"(unknown)";
  const email=pick(rec,[/e-?mail/])||"";
  const sizeAns=pick(rec,[/how many/,/registering/,/golfers/]);
  const t=tierFor(pick(rec,[/package/,/tier/]))||tierFor(sizeAns);
  const attendAns=pick(rec,[/attend/]);
  const attending=attendAns?!/\b(no|can'?t|cannot|sorry|won'?t|decline|unable|not)\b/i.test(attendAns):true;
  const others=parseGolfers(pick(rec,[/other golfers/,/names? *(&|and) *emails/,/playing with/]));
  return { key:(email||name).toLowerCase().trim(), name:name, email:email,
    tier:t?t.label:(sizeAns||""), size:t?t.g:1, price:t?t.p:0, attending:attending, others:others };
}

function realTokens(){
  const out=[];
  REGS.filter(r=>r.attending).forEach(r=>{
    out.push({ id:r.key+"::cap", name:r.name, email:r.email, cap:true, reg:r.key });
    r.others.forEach((o,i)=>{ out.push({ id:r.key+"::o"+i, name:o.name, email:o.email, cap:false, reg:r.key }); });
  });
  return out;
}
function autoAssign(){
  const toks=realTokens();
  const byParty={}; toks.forEach(t=>{ (byParty[t.reg]=byParty[t.reg]||[]).push(t); });
  const fours=[];
  Object.keys(byParty).forEach((k,idx)=>{
    const reg=REGS.find(r=>r.key===k);
    const mem=byParty[k].slice();
    const size=reg?reg.size:mem.length;
    let n=mem.length;
    while(n<size){ mem.push({ id:k+"::tbd"+n, name:"TBD", email:"", cap:false, reg:k, tbd:true }); n++; }
    fours.push({ id:"f"+idx+"-"+Date.now(), name:"Foursome "+(idx+1), members:mem });
  });
  ARR={ foursomes:fours, unassigned:[], removed:[] };
  save();
}
function mergeLoad(){
  const toks=realTokens();
  let saved=lsGet(ARR_KEY,null)||SAVED_ARRANGEMENT;
  if(!saved){ autoAssign(); return; }
  ARR={ foursomes:saved.foursomes||[], unassigned:saved.unassigned||[], removed:saved.removed||[] };
  const valid={}; toks.forEach(t=>valid[t.id]=t);
  const keep=m=> m.tbd || /::tbd/.test(m.id) || /^manual/.test(m.id) || valid[m.id];
  const refresh=m=>{ if(valid[m.id]){ m.name=valid[m.id].name; m.email=valid[m.id].email; m.cap=valid[m.id].cap; } return m; };
  ARR.foursomes.forEach(f=>{ f.members=f.members.filter(keep).map(refresh); });
  ARR.unassigned=ARR.unassigned.filter(keep).map(refresh);
  const placed={}; ARR.foursomes.forEach(f=>f.members.forEach(m=>placed[m.id]=1)); ARR.unassigned.forEach(m=>placed[m.id]=1);
  toks.forEach(t=>{ if(!placed[t.id] && (ARR.removed||[]).indexOf(t.id)<0) ARR.unassigned.push(t); });
}
function save(){ lsSet(ARR_KEY, ARR); }

function findRemove(id){
  for(const f of ARR.foursomes){ const i=f.members.findIndex(m=>m.id===id); if(i>=0) return f.members.splice(i,1)[0]; }
  const j=ARR.unassigned.findIndex(m=>m.id===id); if(j>=0) return ARR.unassigned.splice(j,1)[0];
  return null;
}
function moveToken(id,kind,fid){
  const t=findRemove(id); if(!t) return;
  if(kind==="un") ARR.unassigned.push(t);
  else { const f=ARR.foursomes.find(x=>x.id===fid); (f?f.members:ARR.unassigned).push(t); }
  save(); render();
}
function removeToken(id){
  const t=findRemove(id); if(!t) return;
  if(!t.tbd && id.indexOf("manual")!==0) (ARR.removed=ARR.removed||[]).push(id);
  save(); render();
}
function addNamed(fid,val){
  const name=(val||"").trim(); if(!name) return;
  const f=ARR.foursomes.find(x=>x.id===fid); if(!f) return;
  f.members.push({ id:"manual-"+Date.now(), name:name, email:"", cap:false });
  save(); render();
}
function delFoursome(fid){
  const i=ARR.foursomes.findIndex(x=>x.id===fid); if(i<0) return;
  const f=ARR.foursomes[i];
  f.members.filter(m=>!m.tbd).forEach(m=>ARR.unassigned.push(m));
  ARR.foursomes.splice(i,1); save(); render();
}
function addFoursome(){
  ARR.foursomes.push({ id:"f-"+Date.now(), name:"Foursome "+(ARR.foursomes.length+1), members:[] });
  save(); render();
}
function renameFoursome(fid){
  const f=ARR.foursomes.find(x=>x.id===fid); if(!f) return;
  const v=prompt("Rename this group:", f.name); if(v==null) return;
  f.name=v.trim()||f.name; save(); render();
}
function placeUnassigned(){
  const pool=ARR.unassigned.slice(); ARR.unassigned=[];
  pool.forEach(t=>{
    let f=ARR.foursomes.find(x=>x.members.filter(m=>!m.tbd).length<4 && x.members.some(m=>m.tbd));
    if(f){ const ti=f.members.findIndex(m=>m.tbd); if(ti>=0) f.members.splice(ti,1); f.members.push(t); return; }
    f=ARR.foursomes.find(x=>x.members.length<4);
    if(f){ f.members.push(t); return; }
    ARR.foursomes.push({ id:"f-"+Date.now()+Math.random(), name:"Foursome "+(ARR.foursomes.length+1), members:[t] });
  });
  save(); render();
}
function resetAll(){ if(confirm("Re-auto-assign everyone from the responses? This clears your manual changes.")){ autoAssign(); render(); } }

async function downloadSite(){
  try{
    const html=await (await fetch(location.href,{cache:"no-store"})).text();
    const json=JSON.stringify(ARR);
    const out=html.replace(/const SAVED_ARRANGEMENT = [\s\S]*?; \/\*ARR\*\//, function(){ return "const SAVED_ARRANGEMENT = "+json+"; /*ARR*/"; });
    const blob=new Blob([out],{type:"text/html"});
    const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="index.html"; a.click();
  }catch(e){ alert("Could not build the file: "+e.message+". This works once the page is hosted online."); }
}

async function load(){
  $("errbox").innerHTML="";
  try{
    const res=await fetch(CSV_URL,{cache:"no-store"});
    if(!res.ok) throw new Error("HTTP "+res.status);
    const table=parseCSV(await res.text()).filter(r=>r.some(c=>(c||"").trim()!==""));
    const headers=table[0].map(h=>h.toLowerCase().trim());
    REGS=table.slice(1).map(cells=>{ const rec={}; headers.forEach((h,j)=>{ if(h) rec[h]=(cells[j]||"").trim(); }); return buildReg(rec); })
      .filter(r=>r.name && r.name!=="(unknown)");
    mergeLoad();
    $("updated").textContent="Updated "+new Date().toLocaleString();
    render();
  }catch(e){
    $("updated").textContent="";
    $("errbox").innerHTML='<div class="err">Could not load responses: '+esc(e.message)+'. Make sure the sheet is published to the web as CSV.</div>';
  }
}

function setPaid(k,v){ if(v)PAID[k]=1; else delete PAID[k]; lsSet(PAID_KEY,PAID); render(); }

function tokHtml(t){
  return '<div class="tok'+(t.tbd?' tbd':'')+'" draggable="true" data-id="'+esc(t.id)+'">'+
    '<span class="gr">&#10303;</span>'+
    '<span class="tn">'+esc(t.name||"TBD")+(t.cap?' <span class="star">&#9733;</span>':'')+'</span>'+
    (t.email?'<span class="te">'+esc(t.email)+'</span>':'')+
    '<button class="x" data-rm="'+esc(t.id)+'" title="Remove">&#10005;</button>'+
  '</div>';
}
function fourHtml(f){
  const real=f.members.filter(m=>!m.tbd).length;
  let h='<div class="four" data-drop="f" data-fid="'+esc(f.id)+'">';
  h+='<div class="fh"><strong class="fname" data-ren="'+esc(f.id)+'" title="Click to rename">'+esc(f.name)+'</strong>';
  h+='<span class="cnt'+(f.members.length>=4?' full':'')+'">'+f.members.length+' / 4</span></div>';
  h+='<div class="toks">'+f.members.map(tokHtml).join("")+'</div>';
  h+='<div class="fadd"><input data-addinput="'+esc(f.id)+'" placeholder="Add golfer name...">';
  h+='<button data-addbtn="'+esc(f.id)+'">Add</button>';
  h+='<button class="ghost" data-delf="'+esc(f.id)+'">Delete</button></div>';
  return h+'</div>';
}
function unassignedHtml(){
  let h='<div class="four un" data-drop="un">';
  h+='<div class="fh"><strong>Unassigned golfers</strong><span class="cnt">'+ARR.unassigned.length+'</span></div>';
  h+='<div class="toks">'+ARR.unassigned.map(tokHtml).join("")+'</div>';
  if(!ARR.unassigned.length) h+='<div style="font-size:12.5px;color:var(--muted);padding:6px 2px">Drop golfers here to set them aside.</div>';
  return h+'</div>';
}

function render(){
  const att=REGS.filter(r=>r.attending);
  let golfers=0; ARR.foursomes.forEach(f=>golfers+=f.members.filter(m=>!m.tbd).length);
  golfers+=ARR.unassigned.filter(m=>!m.tbd).length;
  const expected=att.reduce((s,r)=>s+r.price,0);
  const collected=att.filter(r=>PAID[r.key]).reduce((s,r)=>s+r.price,0);

  let html='<div class="cards">'+
    cardHtml("RSVPs",att.length)+cardHtml("Golfers",golfers)+cardHtml("Foursomes",ARR.foursomes.length)+
    cardHtml("Expected",fmt(expected))+cardHtml("Collected",fmt(collected),"good")+'</div>';

  html+='<div class="barrow"><h2>Foursomes &mdash; drag golfers to adjust</h2><div class="tools">'+
    '<button class="primary" id="tPlace">Place unassigned</button>'+
    '<button id="tAdd">+ Foursome</button>'+
    '<button id="tReset">Reset</button>'+
    '<button class="amber" id="tDownload">&#8595; Download site file</button></div></div>';

  html+='<div class="help">Groups are auto-assigned from the responses (each paid party kept together). '+
    'Drag any golfer to a different foursome or to <b>Unassigned</b>, click a group title to rename it, '+
    'or use Add/Remove. New RSVPs appear in <b>Unassigned</b> &mdash; click <b>Place unassigned</b> to slot them in. '+
    'When it looks right, click <b>Download site file</b> and commit the new <code>index.html</code> to GitHub to publish.</div>';

  html+='<div class="grid">'+ARR.foursomes.map(fourHtml).join("")+unassignedHtml()+'</div>';

  html+='<h2 class="sec">Payment checklist</h2>'+paymentsHtml(att,collected,expected);

  $("app").innerHTML=html;
  wire();
}
function cardHtml(label,value,cls){
  return '<div class="card '+(cls||"")+'"><div class="label">'+label+'</div><div class="value">'+value+'</div></div>';
}
function paymentsHtml(rows,collected,expected){
  if(!rows.length) return '<div class="panel"><div class="pay-head">No registrations yet.</div></div>';
  const pct=expected?Math.round(collected/expected*100):0;
  const paid=rows.filter(r=>PAID[r.key]).length;
  let h='<div class="panel"><div class="pay-head"><b>'+fmt(collected)+'</b> of '+fmt(expected)+
    ' collected &middot; <b>'+paid+'</b> of '+rows.length+' parties paid<div class="bar"><span style="width:'+pct+'%"></span></div></div>';
  rows.slice().sort((a,b)=>a.name.localeCompare(b.name)).forEach(r=>{
    const p=!!PAID[r.key];
    h+='<div class="pay-row'+(p?' paid':'')+'">'+
      '<input type="checkbox" data-pay="'+esc(r.key)+'"'+(p?' checked':'')+'>'+
      '<span class="nm">'+esc(r.name)+'</span>'+
      '<span class="pill">'+esc(r.tier)+'</span>'+
      '<span class="tag '+(p?'y':'n')+'">'+(p?'Paid':'Owes')+'</span>'+
      '<span class="amt">'+fmt(r.price)+'</span></div>';
  });
  return h+'</div>';
}

let dragId=null;
function wire(){
  $("tPlace").onclick=placeUnassigned;
  $("tAdd").onclick=addFoursome;
  $("tReset").onclick=resetAll;
  $("tDownload").onclick=downloadSite;
  qsa("[data-pay]").forEach(cb=>cb.onchange=()=>setPaid(cb.dataset.pay,cb.checked));
  qsa("[data-rm]").forEach(b=>b.onclick=(e)=>{ e.stopPropagation(); removeToken(b.dataset.rm); });
  qsa("[data-ren]").forEach(el=>el.onclick=()=>renameFoursome(el.dataset.ren));
  qsa("[data-delf]").forEach(b=>b.onclick=()=>delFoursome(b.dataset.delf));
  qsa("[data-addbtn]").forEach(b=>b.onclick=()=>{
    const inp=document.querySelector('[data-addinput="'+b.dataset.addbtn.replace(/"/g,'')+'"]');
    if(inp){ addNamed(b.dataset.addbtn, inp.value); }
  });
  qsa('[data-addinput]').forEach(inp=>inp.onkeydown=(e)=>{ if(e.key==="Enter"){ addNamed(inp.dataset.addinput, inp.value); } });
  qsa('.tok[draggable=true]').forEach(el=>{
    el.addEventListener("dragstart",e=>{ dragId=el.dataset.id; e.dataTransfer.effectAllowed="move"; e.dataTransfer.setData("text/plain",el.dataset.id); });
    el.addEventListener("dragend",()=>{ dragId=null; });
  });
  qsa('[data-drop]').forEach(z=>{
    z.addEventListener("dragover",e=>{ e.preventDefault(); z.classList.add("over"); });
    z.addEventListener("dragleave",()=>z.classList.remove("over"));
    z.addEventListener("drop",e=>{ e.preventDefault(); z.classList.remove("over");
      const id=dragId||e.dataTransfer.getData("text/plain");
      if(id) moveToken(id, z.dataset.drop, z.dataset.fid||""); dragId=null; });
  });
}

$("refresh").onclick=load;
load();
</script>
</body>
</html>
